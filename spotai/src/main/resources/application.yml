server:
  port: 8080

spring:
  application:
    name: spotai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/spotai_0?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 000000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: 540788
      timeout: 3s

rocketmq:
  name-server: localhost:9876
  producer:
    group: spotai-voucher-order-producer

spotai:
  auth:
    code-ttl-minutes: 5
    token-ttl-minutes: 30
  voucher:
    order-topic: spotai.voucher-order.create
    order-consumer-group: spotai-voucher-order-consumer
  minio:
    endpoint: http://localhost:9000
    external-endpoint: http://localhost:9000
    access-key: admin
    secret-key: "000000"
    bucket: spotai
    blog-prefix: blog
    public-read: true
