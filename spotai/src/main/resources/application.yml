server:
  port: 8080

spring:
  application:
    name: spotai
  config:
    import: optional:file:./local-secrets.properties
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/spotai_0?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD}
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD}
      timeout: 3s
  ai:
    model:
      chat: openai
      embedding: dashscope
    openai:
      api-key: ${DEEPSEEK_API_KEY:not-configured}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_CHAT_MODEL:deepseek-chat}
          temperature: 0.2
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:not-configured}
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:spotai-voucher-order-producer}

spotai:
  auth:
    code-ttl-minutes: 5
    token-ttl-minutes: 30
  voucher:
    mq-enabled: ${SPOTAI_VOUCHER_MQ_ENABLED:true}
    order-topic: spotai.voucher-order.create
    order-consumer-group: spotai-voucher-order-consumer
  mq:
    enabled: ${SPOTAI_MQ_ENABLED:${SPOTAI_VOUCHER_MQ_ENABLED:true}}
    review-summary-topic: spotai.review-summary.refresh
    shop-changed-topic: spotai.shop.changed
    uv-record-topic: spotai.uv.record
    blog-published-topic: spotai.blog.published
    normal-voucher-order-topic: spotai.voucher-normal-order.create
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:19000}
    external-endpoint: ${MINIO_EXTERNAL_ENDPOINT:http://localhost:19000}
    access-key: admin
    secret-key: ${MINIO_SECRET_KEY}
    bucket: spotai
    blog-prefix: blog
    public-read: true
  ai:
    chat:
      context-window-max-messages: ${SPOTAI_AI_CONTEXT_WINDOW_MAX_MESSAGES:12}
      context-window-max-chars: ${SPOTAI_AI_CONTEXT_WINDOW_MAX_CHARS:2400}
      visible-history-max-messages: ${SPOTAI_AI_VISIBLE_HISTORY_MAX_MESSAGES:20}
      history-max-chars: ${SPOTAI_AI_HISTORY_MAX_CHARS:800}
      memory-max-chars: ${SPOTAI_AI_MEMORY_MAX_CHARS:800}
      memory-total-max-chars: ${SPOTAI_AI_MEMORY_TOTAL_MAX_CHARS:1600}
    review-summary:
      enabled: ${SPOTAI_AI_ENABLED:false}
      top-k: ${REVIEW_AI_TOP_K:20}
      similarity-threshold: ${REVIEW_AI_SIMILARITY_THRESHOLD:0.2}
      min-review-count: ${REVIEW_AI_MIN_REVIEW_COUNT:3}
      cache-ttl-minutes: ${REVIEW_AI_CACHE_TTL_MINUTES:60}
      max-index-reviews: ${REVIEW_AI_MAX_INDEX_REVIEWS:500}
      refresh-scan-delay-ms: ${REVIEW_AI_REFRESH_SCAN_DELAY_MS:60000}
      refresh-scan-initial-delay-ms: ${REVIEW_AI_REFRESH_SCAN_INITIAL_DELAY_MS:10000}
      refresh-batch-size: ${REVIEW_AI_REFRESH_BATCH_SIZE:30}
      embedding-model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}
      index-name: review_vector_idx
      key-prefix: "review:vector:"
      admin-key: ${REVIEW_AI_ADMIN_KEY:}
      vector-redis:
        host: ${VECTOR_REDIS_HOST:localhost}
        port: ${VECTOR_REDIS_PORT:6380}
        password: ${VECTOR_REDIS_PASSWORD:${REDIS_PASSWORD:}}
        timeout-millis: ${VECTOR_REDIS_TIMEOUT_MILLIS:3000}
