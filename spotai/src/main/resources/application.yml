server:
  port: 8080

spring:
  application:
    name: spotai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/spotai_0?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:000000}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:540788}
      timeout: 3s

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:spotai-voucher-order-producer}

spotai:
  auth:
    code-ttl-minutes: 5
    token-ttl-minutes: 30
  voucher:
    mq-enabled: ${SPOTAI_VOUCHER_MQ_ENABLED:true}
    order-topic: spotai.voucher-order.create
    order-consumer-group: spotai-voucher-order-consumer
  minio:
    endpoint: http://localhost:9000
    external-endpoint: http://localhost:9000
    access-key: admin
    secret-key: "000000"
    bucket: spotai
    blog-prefix: blog
    public-read: true
